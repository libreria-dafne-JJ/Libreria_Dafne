<!DOCTYPE html><html lang="es">

<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Dafne - Librería</title>

<style>  
:root {  
  --primary: #1e90ff;  
  --secondary: #ff6f61;  
  --accent: #40e0d0;
  --background: #2A2F41;  
  --card-bg: #000000;  
}  

body {
margin: 0;
font-family: sans-serif;
background: var(--background);
color: #111;

/*  BORDE SOLO LATERAL AZUL */
border-left: 4px solid #1e90ff;
border-right: 4px solid #1e90ff;
box-shadow: 
  inset 5px 0 15px rgba(30,144,255,0.5),
  inset -5px 0 15px rgba(30,144,255,0.5);

min-height: 100vh;
box-sizing: border-box;
}


.top-actions {
padding: 10px;
text-align: center;
}

.top-actions button {
width: 90%;
max-width: 400px;
font-size: 1rem;
}

.generos {
display: flex;
overflow-x: auto;
gap: 10px;
padding: 10px;
}

.generos button {
flex: 0 0 auto;
background: var(--primary);
border-radius: 20px;
padding: 8px 15px;
border: none;
color: white;
}

.generos button.active {
background: var(--accent);
color: black;
}

header {
display: flex;
padding: 15px;
align-items: center;
}

header h2 {
font-size: 2rem;
color: #1e90ff;
margin: 0;
}

.logo {
width: 50px;
height: 50px;
border-radius: 50%;
border: 2px solid var(--primary);
}

.container {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 10px;
padding: 10px;
}

.card {
background: black;
border-radius: 12px;
padding: 10px;
text-align: center;
border: 2px solid var(--primary);
color: white;
}

.card img {
width: 100%;
height: 150px;
object-fit: cover;
border-radius: 10px;
border: 2px solid var(--primary);
}

button {
background: var(--primary);
color: white;
padding: 8px;
border-radius: 8px;
cursor: pointer;
border: none;
}

.cart-btn {
position: fixed;
bottom: 60px;
right: 20px;
background: var(--primary);
padding: 15px;
border-radius: 50%;
color: white;
}

#cart {
position: fixed;
top: 0;
right: -100%;
width: 300px;
height: 100%;
background: black;
padding: 15px;
transition: 0.3s;
color: white;
overflow-y: auto;
}

#cart.active { right: 0; }

.item {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 10px;
}

.item img {
width: 40px;
height: 60px;
object-fit: cover;
border-radius: 5px;
}

.cart-actions {
display: flex;
gap: 10px;
}

.close-btn {
background: red;
flex: 1;
}

.buy-btn {
flex: 1;
}

</style>
</head>

<body>

<header>  
<div style="display:flex; gap:10px; align-items:center;">  
<img src="./logo.png" class="logo">  
<h2>DAFNE</h2>  
</div>  
</header>

<div class="top-actions">
  <button onclick="preguntar()">Preguntar por un libro</button>
</div>

<div class="generos" id="generos"></div>

<div class="container" id="productos"></div>  

<div class="cart-btn" id="cartBtn" onclick="toggleCart()"> <span id="count">0</span></div>  

<div id="cart">  
<h2>Carrito</h2>  
<div id="items"></div>  
<h3>Total: $<span id="total">0</span></h3>  

<div class="cart-actions">
  <button class="buy-btn" onclick="comprar()">Comprar</button>  
  <button class="close-btn" onclick="toggleCart()">Cerrar</button>  
</div>

</div>

<audio id="sound" src="./comprarr.mp3"></audio>

<script>  

let libros = [];

function agregarLibro(nombre, precio, img, genero) {
  libros.push({ nombre, precio, img, genero });
}

// LIBROS
agregarLibro("Hábitos atómicos", 39000, "./img1.jpg", "Desarrollo");
agregarLibro("La psicología del dinero", 39000, "./img2.jpg", "Finanzas");
agregarLibro("Ricky and Morty", 39000, "./img3.jpg", "Comedia");
agregarLibro("Este dolor no es mio", 39000, "./img4.jpg", "Psicología");
agregarLibro("Fabricante de lágrimas", 39000, "./img5.jpg", "Drama");
agregarLibro("Los juegos del hambre", 39000, "./img6.jpg", "Acción");
agregarLibro("A que putas esperas", 39000, "./img7.jpg", "Desarrollo");
agregarLibro("Despues del amor", 39000, "./img8.jpg", "Drama");
agregarLibro("El ego es el enemigo", 39000, "./img9.jpg", "Desarrollo");
agregarLibro("Imaginario", 39000, "./img10.jpg", "Fantasía");
agregarLibro("Narnia", 39000, "./img11.jpg", "Fantasía");

let carrito = [];
let generoActivo = "Todos";

function renderGeneros() {
  let cont = document.getElementById("generos");
  cont.innerHTML = "";

  let generos = ["Todos", ...new Set(libros.map(l => l.genero))];

  generos.forEach(g => {
    cont.innerHTML += `<button class="${g===generoActivo?'active':''}" onclick="cambiarGenero('${g}')">${g}</button>`;
  });
}

function cambiarGenero(g) {
  generoActivo = g;
  renderGeneros();
  render();
}

function render() {
  let cont = document.getElementById("productos");
  cont.innerHTML = "";

  let filtrados = generoActivo === "Todos"
    ? libros
    : libros.filter(l => l.genero === generoActivo);

  filtrados.forEach((l, i) => {
    cont.innerHTML += `
    <div class="card" id="card${i}">
      <img src="${l.img}">
      <h3>${l.nombre}</h3>
      <p>$${l.precio}</p>
      <button onclick="add(${i})">Agregar</button>
    </div>`;
  });
}

function add(i) {
  let filtrados = generoActivo === "Todos"
    ? libros
    : libros.filter(l => l.genero === generoActivo);

  let card = document.getElementById("card" + i);
  let img = card.querySelector("img");

  let clone = img.cloneNode();
  let rect = img.getBoundingClientRect();

  clone.style.position = "fixed";
  clone.style.left = rect.left + "px";
  clone.style.top = rect.top + "px";
  clone.style.width = rect.width + "px";
  clone.style.height = rect.height + "px";
  clone.style.zIndex = 9999;
  clone.style.transition = "all 0.7s ease";

  document.body.appendChild(clone);

  let cart = document.getElementById("cartBtn").getBoundingClientRect();

  setTimeout(() => {
    clone.style.left = cart.left + "px";
    clone.style.top = cart.top + "px";
    clone.style.width = "20px";
    clone.style.height = "20px";
    clone.style.opacity = 0;
  }, 10);

  setTimeout(() => clone.remove(), 700);

  let audio = document.getElementById("sound");
  audio.currentTime = 0;
  audio.play();

  carrito.push(filtrados[i]);
  renderCart();
}

function renderCart() {
  let items = document.getElementById("items");
  let total = 0;
  items.innerHTML = "";

  carrito.forEach((l, i) => {
    items.innerHTML += `
      <div class="item">
        <img src="${l.img}">
        <div style="flex:1;">
          ${l.nombre}<br>$${l.precio}
        </div>
        <button onclick="remove(${i})"></button>
      </div>`;
    total += l.precio;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("count").innerText = carrito.length;
}

function remove(i) {
  carrito.splice(i, 1);
  renderCart();
}

function toggleCart() {
  document.getElementById("cart").classList.toggle("active");
}

function comprar() {
  let texto = "Pedido:\n\n";
  let total = 0;

  carrito.forEach(l => {
    texto += l.nombre + " - $" + l.precio + "\n";
    total += l.precio;
  });

  texto += "\nTOTAL: $" + total;

  window.open("https://wa.me/573106505193?text=" + encodeURIComponent(texto));
}

function preguntar() {
  window.open("https://wa.me/573106505193?text=Hola, busco un libro");
}

renderGeneros();
render();

</script>

</body>
</html>
