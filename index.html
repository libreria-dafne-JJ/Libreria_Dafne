<!DOCTYPE html><html lang="es">

<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Dafne - Librería</title>

<style>  
:root {  
  --primary: #1e90ff;  
  --secondary: #ff6f61;  
  --accent: #fdd835;  
  --background: #2A2F41;  
  --card-bg: #000000;  
}  

body {
margin: 0;
font-family: sans-serif;
background: var(--background);
color: #111;
}

header {
display: flex;
justify-content: space-between;
padding: 15px;
align-items: center;
}

header h2 {
font-size: 2rem;
font-weight: 800;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
color: #1e90ff;
text-shadow: 0 0 8px rgba(30,144,255,0.7);
margin: 0;
text-transform: uppercase;
}

.logo {
width: 50px;
height: 50px;
border-radius: 50%;
border: 2px solid var(--primary);
box-shadow: 0 0 10px rgba(30,144,255,0.6);
}

.container {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 10px;
padding: 10px;
}

.card {
background: var(--card-bg);
border-radius: 12px;
padding: 10px;
text-align: center;
box-shadow: 0 5px 15px rgba(0,0,0,0.3);
position: relative;
overflow: hidden;
border: 2px solid var(--primary);
color: white;
}

.card img {
width: 100%;
height: 150px;
object-fit: cover;
border-radius: 10px;
border: 2px solid var(--primary);
}

.card h3 {
font-size: 1.5rem;
font-weight: 700;
color: #1e90ff;
margin: 10px 0 5px 0;
}

button {
background: var(--primary);
border: none;
color: white;
padding: 8px;
border-radius: 8px;
margin-top: 5px;
cursor: pointer;
}

.ask-btn {
width: 90%;
margin: 15px auto;
display: block;
}

.divider {
width: 90%;
height: 2px;
background: var(--primary);
margin: 10px auto;
}

.cart-btn {
position: fixed;
bottom: 60px;
right: 20px;
background: var(--primary);
color: white;
padding: 15px;
border-radius: 50%;
}

#cart {
position: fixed;
top: 0;
right: -100%;
width: 300px;
height: 100%;
background: var(--card-bg);
padding: 15px;
transition: 0.3s;
color: white;
}

#cart.active { right: 0; }

/* 🔥 NUEVA BARRA */
#paginacion {
display: flex;
justify-content: center;
gap: 10px;
margin: 20px;
}

.page-btn {
padding: 8px 12px;
background: #444;
border-radius: 6px;
cursor: pointer;
color: white;
}

.page-btn.active {
background: var(--primary);
}
</style>
</head>

<body>

<header>  
  <div style="display:flex; gap:10px; align-items:center;">  
    <img src="./logo.png" class="logo">  
    <h2>DAFNE📖</h2>  
  </div>  
</header>

<button class="ask-btn" onclick="preguntar()">Preguntar por un libro📚</button>  
<div class="divider"></div>

<div class="container" id="productos"></div>  

<!-- 🔥 PAGINACIÓN -->
<div id="paginacion"></div>

<div class="cart-btn" onclick="toggleCart()">🛒 <span id="count">0</span></div>  

<div id="cart">  
  <h2>Tu carrito</h2>  
  <div id="items"></div>  
  <h3>Total: $<span id="total">0</span></h3>  
  <button onclick="comprar()">Comprar</button>  
  <button onclick="toggleCart()">Cerrar</button>  
</div>

<audio id="sound" src="./comprarr.mp3"></audio>  

<script>  
let libros = [];

function agregarLibro(nombre, precio, img) {
  libros.push({ nombre, precio, img });
}

// libros
agregarLibro("Hábitos atómicos", 39000, "./img1.jpg");
agregarLibro("La psicología del dinero", 39000, "./img2.jpg");
agregarLibro("Narnia", 39000, "./img3.jpg");
agregarLibro("Libro 4", 39000, "./img4.jpg");
agregarLibro("Libro 5", 39000, "./img5.jpg");
agregarLibro("Libro 6", 39000, "./img6.jpg");
agregarLibro("Libro 7", 39000, "./img7.jpg");
agregarLibro("Libro 8", 39000, "./img8.jpg");
agregarLibro("Libro 9", 39000, "./img9.jpg");
agregarLibro("Libro 10", 39000, "./img10.jpg");
agregarLibro("Libro 11", 39000, "./img11.jpg");

let carrito = [];
let paginaActual = 0;
let porPagina = 10;

function render() {
  let cont = document.getElementById("productos");
  cont.innerHTML = "";

  let inicio = paginaActual * porPagina;
  let fin = inicio + porPagina;

  libros.slice(inicio, fin).forEach((l, i) => {
    cont.innerHTML += `
    <div class="card">
      <img src="${l.img}">
      <h3>${l.nombre}</h3>
      <p>$${l.precio}</p>
      <button onclick="add(${inicio + i})">Agregar</button>
    </div>`;
  });

  renderPaginacion();
}

function renderPaginacion() {
  let totalPaginas = Math.ceil(libros.length / porPagina);
  let pag = document.getElementById("paginacion");
  pag.innerHTML = "";

  for(let i=0;i<totalPaginas;i++){
    pag.innerHTML += `
    <div class="page-btn ${i===paginaActual?'active':''}" onclick="cambiarPagina(${i})">
      ${i+1}
    </div>`;
  }
}

function cambiarPagina(p){
  paginaActual = p;
  render();
}

function add(i){
  carrito.push(libros[i]);
  document.getElementById("sound").play();
  renderCart();
}

function renderCart(){
  let items = document.getElementById("items");
  let total = 0;
  items.innerHTML="";
  carrito.forEach((l,i)=>{
    items.innerHTML+=`<div>${l.nombre} - $${l.precio}</div>`;
    total+=l.precio;
  });
  document.getElementById("total").innerText=total;
  document.getElementById("count").innerText=carrito.length;
}

function toggleCart(){
  document.getElementById("cart").classList.toggle("active");
}

function comprar(){
  let texto="Pedido:\n";
  let total=0;
  carrito.forEach(l=>{
    texto+=l.nombre+" $"+l.precio+"\n";
    total+=l.precio;
  });
  texto+="\nTOTAL: $"+total;
  window.open("https://wa.me/573106505193?text="+encodeURIComponent(texto));
}

function preguntar(){
  window.open("https://wa.me/573106505193");
}

render();
</script>

</body>
</html>
