<!DOCTYPE html><html lang="es">

<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Dafne - Librería</title>

<style>  
:root {  
  --primary: #1e90ff;  
  --secondary: #ff6f61;  
  --accent: #fdd835;  
  --background: #2A2F41;  
  --card-bg: #000000;  
}  

body {
margin: 0;
font-family: sans-serif;
background: var(--background);
color: #111;
}

header {
display: flex;
justify-content: space-between;
padding: 15px;
align-items: center;
}

header h2 {
font-size: 2rem;
font-weight: 800;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
color: #1e90ff;
text-shadow: 0 0 8px rgba(30,144,255,0.7);
margin: 0;
text-transform: uppercase;
}

.logo {
width: 50px;
height: 50px;
border-radius: 50%;
border: 2px solid var(--primary);
box-shadow: 0 0 10px rgba(30,144,255,0.6);
}

.container {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 10px;
padding: 10px;
}

.card {
background: var(--card-bg);
border-radius: 12px;
padding: 10px;
text-align: center;
box-shadow: 0 5px 15px rgba(0,0,0,0.3);
position: relative;
overflow: hidden;
border: 2px solid var(--primary);
color: white;
}

.card img {
width: 100%;
height: 150px;
object-fit: cover;
border-radius: 10px;
border: 2px solid var(--primary);
}

.card h3 {
font-size: 1.5rem;
font-weight: 700;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
color: #1e90ff;
margin: 10px 0 5px 0;
text-shadow: 0 0 5px rgba(0,0,0,0.3);
transition: 0.2s;
}

.card h3:hover {
color: #ff6f61;
cursor: pointer;
}

button {
background: var(--primary);
border: none;
color: white;
padding: 8px;
border-radius: 8px;
margin-top: 5px;
cursor: pointer;
}

.ask-btn {
width: 90%;
margin: 15px auto;
display: block;
background: var(--primary);
color: white;
}

.divider {
width: 90%;
height: 2px;
background: var(--primary);
margin: 10px auto;
border-radius: 2px;
}

.cart-btn {
position: fixed;
bottom: 60px;
right: 20px;
background: var(--primary);
color: white;
padding: 15px;
border-radius: 50%;
transition: 0.2s;
}

.cart-btn.bump {
transform: scale(1.2);
}

.fly {
position: absolute;
width: 50px;
height: 75px;
pointer-events: none;
z-index: 1000;
border: 2px solid var(--primary);
border-radius: 12px;
overflow: hidden;
background: rgba(30,144,255,0.1);
box-shadow: 0 0 5px rgba(30,144,255,0.5);
transition: transform 0.7s ease, opacity 0.7s ease;
}

.fly img {
width: 100%;
height: 100%;
object-fit: cover;
}

#cart {
position: fixed;
top: 0;
right: -100%;
width: 300px;
height: 100%;
background: var(--card-bg);
padding: 15px;
box-shadow: -5px 0 15px rgba(0,0,0,0.2);
transition: 0.3s;
color: white;
overflow-y: auto;
}

#cart.active { right: 0; }

.item {
display: flex;
align-items: center;
border-bottom: 1px solid #555;
padding: 5px 0;
}

.item img {
width: 40px;
height: 60px;
object-fit: cover;
margin-right: 10px;
border: 1px solid var(--primary);
border-radius: 4px;
}

.close-btn {
background: red;
color: white;
border: none;
padding: 8px;
border-radius: 8px;
cursor: pointer;
margin-top: 5px;
}

#footer-msg {
text-align: center;
font-size: 2rem;
font-weight: 700;
color: var(--primary);
margin: 30px 0;
text-shadow: 0 0 10px rgba(30,144,255,0.7);
}
</style>
</head>

<body>

<header>  
  <div style="display:flex; gap:10px; align-items:center;">  
    <img src="./logo.png" class="logo">  
    <h2>DAFNE📖</h2>  
  </div>  
</header>

<button class="ask-btn" onclick="preguntar()">Preguntar por un libro📚</button>  
<div class="divider"></div>

<div class="container" id="productos"></div>  

<div class="cart-btn" id="cartBtn" onclick="toggleCart()">🛒 <span id="count">0</span></div>  

<div id="cart">  
  <h2>Tu carrito</h2>  
  <div id="items"></div>  
  <h3>Total: $<span id="total">0</span></h3>  
  <button onclick="comprar()" style="background:var(--primary);">Comprar</button>  
  <button class="close-btn" onclick="toggleCart()">Cerrar</button>  
</div>

<div id="footer-msg">Hay muchos más</div>

<audio id="sound" src="./comprarr.mp3"></audio>  

<script>  
let libros = [];

function agregarLibro(nombre, precio, img) {
  libros.push({ nombre, precio, img });
}

//  los libros (./)
agregarLibro("Hábitos atómicos", 39000, "./img1.jpg");
agregarLibro("La psicología del dinero", 39000, "./img2.jpg");
agregarLibro("Narnia", 39000, "./img3.jpg");
agregarLibro("Este dolor no es mio", 39000, "./img4.jpg");
agregarLibro("Fabricante de lágrimas", 39000, "./img5.jpg");
agregarLibro("Los juegos del hambre", 39000, "./img6.jpg");

let carrito = [];  

function render() {  
  let cont = document.getElementById("productos");  
  cont.innerHTML = "";  
  libros.forEach((l, i) => {  
    cont.innerHTML += `  
      <div class="card" id="card${i}">  
        <img src="${l.img}">  
        <h3>${l.nombre}</h3>  
        <p>$${l.precio}</p>  
        <button onclick="add(${i})">Agregar</button>  
      </div>`;  
  });  
}  

function add(i) {  
  carrito.push(libros[i]);  
  playSound();  
  animar(i);  
  renderCart();  
}  

function playSound() {  
  let audio = document.getElementById("sound");  
  audio.currentTime = 0;  
  audio.play();  
}  

function animar(i) {  
  let card = document.getElementById("card" + i);  
  let rect = card.getBoundingClientRect();  

  let imgClone = card.querySelector("img").cloneNode();  
  let flyBox = document.createElement("div");  
  flyBox.classList.add("fly");  
  flyBox.style.left = rect.left + window.scrollX + "px";  
  flyBox.style.top = rect.top + window.scrollY + "px";  
  flyBox.appendChild(imgClone);  
  document.body.appendChild(flyBox);  

  let cartBtn = document.getElementById("cartBtn");  
  let cartRect = cartBtn.getBoundingClientRect();  
  let translateX = cartRect.left + cartRect.width/2 - rect.left - rect.width/2;  
  let translateY = cartRect.top + cartRect.height/2 - rect.top - rect.height/2;  

  requestAnimationFrame(() => {  
    flyBox.style.transform = `translate(${translateX}px, ${translateY}px) scale(0.2)`;  
    flyBox.style.opacity = 0;  
  });  

  setTimeout(() => flyBox.remove(), 800);  

  cartBtn.classList.add("bump");  
  setTimeout(() => cartBtn.classList.remove("bump"), 200);  
}  

function renderCart() {  
  let items = document.getElementById("items");  
  let total = 0;  
  items.innerHTML = "";  
  carrito.forEach((l, i) => {  
    items.innerHTML += `<div class="item"><img src='${l.img}'>${l.nombre} - $${l.precio} <button onclick="remove(${i})">❌</button></div>`;  
    total += l.precio;  
  });  
  document.getElementById("total").innerText = total;  
  document.getElementById("count").innerText = carrito.length;  
}  

function remove(i) {  
  carrito.splice(i, 1);  
  renderCart();  
}  

function toggleCart() {  
  document.getElementById("cart").classList.toggle("active");  
}  

function comprar() {  
  if(carrito.length == 0) { alert("Carrito vacío"); return; }  

  let texto = "Pedido:\n\n";  
  let total = 0;  

  carrito.forEach(l => {  
    texto += "• " + l.nombre + " - $" + l.precio + "\n";  
    total += l.precio;  
  });  

  texto += "\nTOTAL: $" + total;  

  let url = "https://wa.me/573106505193?text=" + encodeURIComponent(texto);  
  window.open(url);  
}  

function preguntar() {  
  window.open("https://wa.me/573106505193?text=Hola, busco un libro");  
}  

render();  
</script>

</body>  
</html>
